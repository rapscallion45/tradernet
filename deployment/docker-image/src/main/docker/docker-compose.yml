services:
  tradernet:
    image: tradernet/tradernet:local-test
    ports:
      - "8080:8080"
    environment:
      DB_TYPE: POSTGRES
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: tradernet
      DB_USER: tradernet
      DB_PASSWORD: tradernet
      JAVA_OPTS: >-
        -Dmarket.ai.forecasting.url=http://forecasting-service:8000
        -Dmarket.ai.ollama.url=http://ollama:11434
        -Dmarket.ai.ollama.model=gemma4:e4b
    depends_on:
      postgres:
        condition: service_healthy
      forecasting-service:
        condition: service_started
      ollama:
        condition: service_started
    networks:
      - tradernet_net

  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: tradernet
      POSTGRES_USER: tradernet
      POSTGRES_PASSWORD: tradernet
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ../../../../../data-model/src/main/resources/META-INF/db/schema.sql:/docker-entrypoint-initdb.d/10-schema.sql:ro
      - ../../../../../data-model/src/main/resources/META-INF/db/dev-seed.sql:/docker-entrypoint-initdb.d/11-dev-seed.sql:ro
      - ./timescaledb-init.sql:/docker-entrypoint-initdb.d/20-timescaledb-init.sql:ro
    # Remove host port mapping unless you need to connect from your laptop
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradernet -d tradernet"]
      interval: 2s
      timeout: 2s
      retries: 30
    networks:
      - tradernet_net

  forecasting-service:
    build: ../../../../../python-services/forecasting
    environment:
      DATABASE_URL: postgresql://tradernet:tradernet@postgres:5432/tradernet
      FORECAST_BACKEND: ${FORECAST_BACKEND:-statistical-fallback}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - tradernet_net

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - tradernet_net

  ollama-model:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: http://ollama:11434
    command: ["pull", "gemma4:e4b"]
    depends_on:
      ollama:
        condition: service_started
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - tradernet_net
    profiles:
      - model-init

volumes:
  timescaledb_data:
  ollama_data:

networks:
  tradernet_net:
    driver: bridge
